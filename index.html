<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Resume Analyzer - Upload</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8fafc;
            color: #1f2937;
        }

        .container {
            max-width: 920px;
            margin: 34px auto;
            padding: 0 16px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .topbar a {
            text-decoration: none;
            color: #1d4ed8;
            font-weight: 600;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 6px;
        }

        .subtitle {
            margin-top: 0;
            color: #6b7280;
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-top: 14px;
            margin-bottom: 8px;
        }

        input[type="file"], textarea {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
        }

        textarea {
            min-height: 220px;
            resize: vertical;
        }

        button {
            margin-top: 16px;
            border: none;
            background: #111827;
            color: #ffffff;
            padding: 11px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
        }

        button:hover {
            background: #000000;
        }

        .error {
            margin-top: 14px;
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div>Signed in as <strong>{{ user_identity }}</strong></div>
            <a href="{{ url_for('logout') }}">Sign Out</a>
        </div>

        <div class="card">
            <h1>Upload Resume & Job Description</h1>
            <p class="subtitle">Upload your PDF resume and paste the target job description.</p>

            <form method="POST" enctype="multipart/form-data">
                <label for="resume">Resume (PDF)</label>
                <input type="file" id="resume" name="resume" accept="application/pdf" required />

                <label for="job_desc">Job Description</label>
                <textarea id="job_desc" name="job_desc" placeholder="Paste job description here..." required></textarea>

                <button type="submit">Analyze Resume</button>
            </form>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
        </div>
    </div>
</body>
</html>
